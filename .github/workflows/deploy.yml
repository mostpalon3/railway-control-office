# ============================================================
# GitHub Actions — Build, Push to GHCR, Deploy to EC2
# Triggers on push to main branch
# ============================================================

name: Deploy to EC2

on:
  push:
    branches: [dev]
  workflow_dispatch:  # Allow manual trigger

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Job 1: Build & Push Docker Image ────────────────────
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
            NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
            NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}

  # ── Job 2: Deploy to EC2 ───────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script_stop: true
          script: |
            set -e

            echo "▸ Navigating to project directory..."
            cd ~/railway-control-office

            echo "▸ Logging in to GitHub Container Registry..."
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "▸ Pulling latest image..."
            docker pull ghcr.io/${{ github.repository }}:latest

            echo "▸ Deploying with zero-downtime..."
            # Build a new container alongside the old one
            docker compose up -d --no-deps --build app

            echo "▸ Waiting for health check..."
            sleep 10

            # Verify the new container is healthy
            if docker inspect --format='{{.State.Health.Status}}' rco-app | grep -q "healthy"; then
              echo "✓ New container is healthy!"
            else
              echo "✗ Health check failed — rolling back..."
              docker compose down
              docker compose up -d
              exit 1
            fi

            echo "▸ Cleaning up old images..."
            docker image prune -af --filter "until=24h"

            echo "✓ Deployment complete!"
