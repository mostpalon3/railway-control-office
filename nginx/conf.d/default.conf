# ============================================================
# Server block — HTTP → HTTPS redirect + reverse proxy
# Replace YOUR_DOMAIN.com with your actual domain
# ============================================================

# ── Upstream (Next.js container) ──────────────────────────
upstream nextjs_upstream {
    server app:3000;

    # Keep connections alive to reduce handshake overhead
    keepalive 64;
}

# ── HTTP server — redirect to HTTPS + ACME challenge ─────
server {
    listen 80;
    listen [::]:80;
    server_name 13.63.0.60.sslip.io;

    # Certbot ACME challenge (must stay on HTTP)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS server — main reverse proxy ───────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name 13.63.0.60.sslip.io;

    # ── SSL Certificates (Let's Encrypt) ─────────────────
    ssl_certificate     /etc/letsencrypt/live/13.63.0.60.sslip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/13.63.0.60.sslip.io/privkey.pem;

    # ── SSL Hardening ────────────────────────────────────
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ── Security Headers ─────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── Client Settings ──────────────────────────────────
    client_max_body_size 10M;

    # ── Static Assets (Next.js) — long cache ─────────────
    location /_next/static/ {
        proxy_pass http://nextjs_upstream;
        proxy_cache_valid 200 60d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── Public Assets ────────────────────────────────────
    location /assets/ {
        proxy_pass http://nextjs_upstream;
        add_header Cache-Control "public, max-age=86400";
    }

    # ── API Routes — stricter rate limit ────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass http://nextjs_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # Timeouts for API routes
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 60s;
    }

    # ── Default — all other routes ──────────────────────
    location / {
        limit_req zone=general burst=30 nodelay;

        proxy_pass http://nextjs_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }
}
