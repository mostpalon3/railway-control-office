# ============================================================
# Docker Compose — Next.js + Nginx reverse proxy
# Usage:  docker compose up -d --build
# ============================================================

services:
  # ── Next.js Application ──────────────────────────────────
  app:
    image: ghcr.io/mostpalon3/railway-control-office:latest
    container_name: rco-app
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
    expose:
      - "3000"
    networks:
      - rco-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ── Nginx Reverse Proxy ──────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: rco-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
    depends_on:
      - app
    networks:
      - rco-network

  # ── Certbot (SSL certificate manager) ───────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: rco-certbot
    volumes:
      - ./certbot/www:/var/www/certbot:rw
      - ./certbot/conf:/etc/letsencrypt:rw
    # Runs once then exits — renewed via cron on host
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - rco-network

networks:
  rco-network:
    driver: bridge
